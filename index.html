<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock, Paper, Scissors</title>
</head>

<body>
    <p>Welcome to my new and improved game of <strong>Rock, Paper, Scissors</strong>, now featuring a UI!</p>
    <p>Rounds will be played until either the player or the computer has won five rounds.</p>
    <br>
    <p><strong id="scoreLabel">Current Score</strong> - <span id="scoreSpan">Player: 0 | Computer: 0</span></p>
    <p id="gameResult"></p>
    <br>
    <button>Rock</button>
    <button>Paper</button>
    <button>Scissors</button>
    <div id="roundResults"></div>
    <script src="js/script.js"></script>
</body>

</html>
